name: Publish store image

# Builds the store image (Dockerfile.store — Arweave blob storage, NIP-90
# kind:5094) and pushes it to GHCR as ghcr.io/toon-protocol/store. This is the
# normal store APP image; the connector-with-config payment-proxy image is
# published separately by publish-store-connector-image.yml.
#
# (Renamed from the former `dvm` image — consumers pinning .../dvm must move to
# .../store.) The store is a payment-oblivious POST /store backend; the connector
# runs in FRONT as the payment proxy and reverse-proxies to it (RouteTermination).
#
# `latest` is (re)published on every push to main; version tags (vX.Y.Z) also
# publish semver tags for pinning, plus an immutable sha tag.
#
# Single-arch (amd64): the devnet Linode boxes are x86, and Dockerfile.store
# cherry-picks prebuilt linux-x64-musl NAPI bindings (better-sqlite3, libsql).
# No --build-context memvid is needed — this is the Arweave-only variant, which
# drops the kind:5250 Dungeon/pet-circuit/memvid-node dependency chain.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency: publish-store-image-${{ github.ref }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/store
          # `latest` tracks main; semver tags publish on vX.Y.Z; sha tags give
          # an immutable handle.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.store
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
