name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  devbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.15.0

      - name: Build and test
        run: devbox run -- bash -c "pnpm install && pnpm build && pnpm typecheck && pnpm test"
