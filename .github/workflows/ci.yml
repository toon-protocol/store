name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Record gate start time
        id: gate_start
        run: echo "seconds=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - name: Enforce gate no-regression guard
        run: |
          end=$(date +%s)
          elapsed=$(( end - ${{ steps.gate_start.outputs.seconds }} ))
          echo "Gate wall-clock: ${elapsed}s"
          GATE_WALL_CLOCK_SECONDS="$elapsed" npx tsx src/gate-regression-guard.ts

  devbox-validate:
    name: Devbox Environment Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Assert tool versions
        run: |
          cat > "${RUNNER_TEMP:-/tmp}/assert-versions.sh" <<'ASSERT'
          set -euo pipefail
          node --version | grep -E '^v22\.'
          pnpm --version | grep -E '^8\.15\.'
          ASSERT
          devbox run -- bash "${RUNNER_TEMP:-/tmp}/assert-versions.sh"
          echo "✅ All devbox tools resolved at expected versions"

      - name: Smoke build
        run: devbox run -- bash -c "pnpm install --frozen-lockfile && pnpm build"
