name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Record gate start time
        id: gate_start
        run: echo "seconds=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # build/typecheck/lint/test are independent of each other (build doesn't
      # consume typecheck's output, vitest runs against src/ not dist/, lint is
      # standalone), so run them concurrently instead of as sequential steps to
      # cut gate wall-clock. Each still surfaces its own pass/fail clearly.
      - name: Build, typecheck, lint, and test (parallel)
        run: |
          set +e
          pnpm build > /tmp/build.log 2>&1 &
          build_pid=$!
          pnpm typecheck > /tmp/typecheck.log 2>&1 &
          typecheck_pid=$!
          pnpm lint > /tmp/lint.log 2>&1 &
          lint_pid=$!
          pnpm test > /tmp/test.log 2>&1 &
          test_pid=$!

          wait "$build_pid"; build_status=$?
          wait "$typecheck_pid"; typecheck_status=$?
          wait "$lint_pid"; lint_status=$?
          wait "$test_pid"; test_status=$?

          echo "::group::pnpm build"; cat /tmp/build.log; echo "::endgroup::"
          echo "::group::pnpm typecheck"; cat /tmp/typecheck.log; echo "::endgroup::"
          echo "::group::pnpm lint"; cat /tmp/lint.log; echo "::endgroup::"
          echo "::group::pnpm test"; cat /tmp/test.log; echo "::endgroup::"

          if [ "$build_status" -ne 0 ] || [ "$typecheck_status" -ne 0 ] || [ "$lint_status" -ne 0 ] || [ "$test_status" -ne 0 ]; then
            echo "::error::gate failed — build=$build_status typecheck=$typecheck_status lint=$lint_status test=$test_status"
            exit 1
          fi

      - name: Enforce gate no-regression guard
        run: |
          end=$(date +%s)
          elapsed=$(( end - ${{ steps.gate_start.outputs.seconds }} ))
          echo "Gate wall-clock: ${elapsed}s"
          GATE_WALL_CLOCK_SECONDS="$elapsed" npx tsx src/gate-regression-guard.ts

  devbox-validate:
    name: Devbox Environment Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Assert tool versions
        run: |
          cat > "${RUNNER_TEMP:-/tmp}/assert-versions.sh" <<'ASSERT'
          set -euo pipefail
          node --version | grep -E '^v22\.'
          pnpm --version | grep -E '^8\.15\.'
          ASSERT
          devbox run -- bash "${RUNNER_TEMP:-/tmp}/assert-versions.sh"
          echo "✅ All devbox tools resolved at expected versions"

      - name: Smoke build
        run: devbox run -- bash -c "pnpm install --frozen-lockfile && pnpm build"
