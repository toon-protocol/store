# Connector config for townhouse dev stack (Story 21.8.0 / 21.10)
#
# Serves as the standalone ILP connector hub for the dev topology:
#   connector ← town-01, town-02, mill-01, mill-02, dvm-01
#
# Child nodes connect TO this connector's BTP server on port 3000.
# No-auth mode is enabled (BTP_ALLOW_NOAUTH default = true) for dev.
#
# Admin API on port 9401 is used by Townhouse's ConnectorAdminClient.
# Health check on port 9401 (admin server exposes /health).
#
# DEV ONLY — not for production use.

nodeId: g.townhouse.dev
btpServerPort: 3000
healthCheckPort: 8080
environment: development
deploymentMode: standalone
logLevel: info

adminApi:
  enabled: true
  port: 9401
  host: 0.0.0.0
  allowedIPs:
    - 0.0.0.0/0

peers: []

routes: []
