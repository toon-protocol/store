# Connector config TEMPLATE for townhouse hidden-service mode (sidecar pattern).
#
# This template is rendered by `scripts/townhouse-hs-init.sh` into
# `townhouse-hs-connector.local.yaml` — the rendered file is what the compose
# mounts into the connector container. The local file is gitignored.
#
# What the init script substitutes:
#   __TOWNHOUSE_EXTERNAL_URL__  →  wss://<.anyone-from-keygen>/btp
#
# Architecture (Phase 4 sidecar pattern):
#
#   external peer
#     │ wss://<addr>.anyone/btp           (Anyone Protocol)
#     ▼
#   ator-sidecar container  (docker/townhouse-ator-sidecar/)
#     │ runs anon directly with a hand-written torrc
#     │ HiddenServiceDir /var/lib/anon/hs   (pre-seeded keypair)
#     │ HiddenServicePort 3000 connector:3000
#     │ SOCKSPort 0.0.0.0:9050              (outbound proxy for connector)
#     ▼
#   connector container (this YAML configures it)
#     │ transport.type=socks5
#     │ transport.socksProxy=socks5h://ator-sidecar:9050
#     │ transport.externalUrl=wss://<addr>.anyone/btp  (set explicitly here)
#     │ transport.managed=false   (no in-process anon — broken at SDK v1.1.3)
#     │ btpServerPort=3000        (sidecar's HS forwards inbound here)
#     ▼
#   children: town, mill, dvm   (apex dials btp+ws://<svc>:3000)
#
# Why managed=false: the in-process @anyone-protocol/anyone-client SDK at
# v1.1.3 ignores HiddenServiceDir options and never publishes a hidden
# service. The connector source has the wiring but the upstream SDK doesn't
# deliver. The sidecar runs anon directly with full torrc control, and the
# connector treats it as an external SOCKS5 proxy + uses an explicit
# externalUrl (which the operator KNOWS up-front because the keypair was
# pre-generated by townhouse-hs-init.sh).
#
# DEV ONLY — adminApi is open (allowedIPs: 0.0.0.0/0) and BTP no-auth is
# implicit. Production deployments lock these down.

nodeId: g.townhouse
btpServerPort: 3000
healthCheckPort: 8080
environment: development
deploymentMode: standalone
logLevel: info

adminApi:
  enabled: true
  port: 9401
  host: 0.0.0.0
  allowedIPs:
    - 0.0.0.0/0

transport:
  type: socks5
  # Outbound BTP routes through the sidecar's SOCKS5 proxy. socks5h:// is
  # required (DNS-through-proxy) so .anyone destinations resolve at the
  # anon binary, not locally.
  socksProxy: socks5h://ator-sidecar:9050
  # The .anyone URL the connector advertises to peers. Set by the init
  # script after pre-generating the keypair. The sidecar publishes the
  # SAME hostname (because it's seeded with the same secret key).
  externalUrl: __TOWNHOUSE_EXTERNAL_URL__
  # managed=false: connector does NOT spawn its own anon. The sidecar does.
  managed: false

# Children that dial INBOUND to the apex via BTP (each child runs its own
# embedded ConnectorNode — see packages/{town,mill}/src/cli.ts). The btpUrl
# field is required by the connector schema and used by the apex's outbound
# BTP client manager; in this stack the apex's transport=socks5 can't resolve
# Docker DNS through the Anyone network, so the outbound dial fails. That's
# fine — children dial UP to the apex on startup, and the apex accepts them
# via BTP_ALLOW_NOAUTH (default-permissive). The static peer config makes
# routes resolvable; the inbound BTP session is what carries traffic.
peers:
  - id: town
    url: ws://townhouse-hs-town:3000
    authToken: ''
    assetCode: USD
    assetScale: 6
  - id: mill
    url: ws://townhouse-hs-mill:3000
    authToken: ''
    assetCode: USD
    assetScale: 6

# Routes — children's ILP prefixes route through the named peer. Connector's
# isValidILPAddress rejects trailing dots; RoutingTable matches via prefix +
# '.' delimiter, so 'g.townhouse.town' (no trailing dot) is correct.
routes:
  - prefix: g.townhouse.town
    nextHop: town
    priority: 100
  - prefix: g.townhouse.mill
    nextHop: mill
    priority: 100
