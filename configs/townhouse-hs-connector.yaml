# Connector config TEMPLATE for townhouse hidden-service mode (sidecar pattern).
#
# This template is rendered by `scripts/townhouse-hs-init.sh` into
# `townhouse-hs-connector.local.yaml` — the rendered file is what the compose
# mounts into the connector container. The local file is gitignored.
#
# What the init script substitutes:
#   __TOWNHOUSE_EXTERNAL_URL__  →  wss://<.anyone-from-keygen>/btp
#
# Architecture (Phase 4 sidecar pattern):
#
#   external peer
#     │ wss://<addr>.anyone/btp           (Anyone Protocol)
#     ▼
#   ator-sidecar container  (docker/townhouse-ator-sidecar/)
#     │ runs anon directly with a hand-written torrc
#     │ HiddenServiceDir /var/lib/anon/hs   (pre-seeded keypair)
#     │ HiddenServicePort 3000 connector:3000
#     │ SOCKSPort 0.0.0.0:9050              (outbound proxy for connector)
#     ▼
#   connector container (this YAML configures it)
#     │ transport.type=socks5
#     │ transport.socksProxy=socks5h://ator-sidecar:9050
#     │ transport.externalUrl=wss://<addr>.anyone/btp  (set explicitly here)
#     │ transport.managed=false   (no in-process anon — broken at SDK v1.1.3)
#     │ btpServerPort=3000        (sidecar's HS forwards inbound here)
#     ▼
#   children: town, mill, dvm   (apex dials btp+ws://<svc>:3000)
#
# Why managed=false: the in-process @anyone-protocol/anyone-client SDK at
# v1.1.3 ignores HiddenServiceDir options and never publishes a hidden
# service. The connector source has the wiring but the upstream SDK doesn't
# deliver. The sidecar runs anon directly with full torrc control, and the
# connector treats it as an external SOCKS5 proxy + uses an explicit
# externalUrl (which the operator KNOWS up-front because the keypair was
# pre-generated by townhouse-hs-init.sh).
#
# DEV ONLY — adminApi is open (allowedIPs: 0.0.0.0/0) and BTP no-auth is
# implicit. Production deployments lock these down.

nodeId: g.townhouse
btpServerPort: 3000
healthCheckPort: 8080
environment: development
deploymentMode: standalone
logLevel: info

adminApi:
  enabled: true
  port: 9401
  host: 0.0.0.0
  allowedIPs:
    - 0.0.0.0/0

transport:
  type: socks5
  # Outbound BTP routes through the sidecar's SOCKS5 proxy. socks5h:// is
  # required (DNS-through-proxy) so .anyone destinations resolve at the
  # anon binary, not locally.
  socksProxy: socks5h://ator-sidecar:9050
  # The .anyone URL the connector advertises to peers. Set by the init
  # script after pre-generating the keypair. The sidecar publishes the
  # SAME hostname (because it's seeded with the same secret key).
  externalUrl: __TOWNHOUSE_EXTERNAL_URL__
  # managed=false: connector does NOT spawn its own anon. The sidecar does.
  managed: false

# Children that dial INBOUND to the apex via BTP (each child runs its own
# embedded ConnectorNode — see packages/{town,mill}/src/cli.ts). The btpUrl
# field is required by the connector schema and used by the apex's outbound
# BTP client manager; in this stack the apex's transport=socks5 can't resolve
# Docker DNS through the Anyone network, so the outbound dial fails. That's
# fine — children dial UP to the apex on startup, and the apex accepts them
# via BTP_ALLOW_NOAUTH (default-permissive). The static peer config makes
# routes resolvable; the inbound BTP session is what carries traffic.
#
# `evmAddress` is per-child. The apex's PerPacketClaimService dials these
# addresses when opening payment channels via POST /channels (operator
# script: scripts/townhouse-hs-open-channels.sh). DEV-ONLY assignment —
# Anvil deterministic accounts:
#   apex (this connector) → acct[3] = 0x90F79bf6EB2c4f870365E785982E1f101E93b906
#                            (chainProviders.keyId privkey above)
#   town                  → acct[4] = 0x15d34AAf54267DB7D7c367839AAf71A00a2C6A65
#   mill                  → acct[5] = 0x9965507D1a55bcC2695C58ba16FB37d819B0A4dc
# Operators MUST replace these for any non-Anvil deployment.
peers:
  - id: town
    url: ws://townhouse-hs-town:3000
    authToken: ''
    assetCode: USD
    assetScale: 6
    evmAddress: '0x15d34AAf54267DB7D7c367839AAf71A00a2C6A65'
  - id: mill
    url: ws://townhouse-hs-mill:3000
    authToken: ''
    assetCode: USD
    assetScale: 6
    evmAddress: '0x9965507D1a55bcC2695C58ba16FB37d819B0A4dc'
  # Test client peer — used by packages/client/scripts/social-flow-hs-e2e.ts
  # to send signed payment-channel claims through the apex. The url is a
  # placeholder (the client dials INTO the apex via BTP/SOCKS, never the
  # other way around — the apex would only outbound-dial it for hub-style
  # claim push-back, which we don't exercise from this script). The
  # evmAddress is Anvil acct[6], pre-funded with USDC by
  # scripts/townhouse-hs-open-channels.sh so the apex can open a channel
  # to it via /admin/channels.
  - id: client
    url: ws://townhouse-hs-client-placeholder:3000
    authToken: ''
    assetCode: USD
    assetScale: 6
    evmAddress: '0x976EA74026E726554dB657fA54763abd0C3a0aa9'

# Routes — children's ILP prefixes route through the named peer. Connector's
# isValidILPAddress rejects trailing dots; RoutingTable matches via prefix +
# '.' delimiter, so 'g.townhouse.town' (no trailing dot) is correct.
routes:
  - prefix: g.townhouse.town
    nextHop: town
    priority: 100
  - prefix: g.townhouse.mill
    nextHop: mill
    priority: 100

# Chain providers — required for PerPacketClaimService + ClaimReceiver to
# auto-instantiate inside the connector. Without this block the apex rejects
# any forwarded paid PREPARE with `T00 - Per-packet claim service not
# configured`. The image (ghcr.io/toon-protocol/connector:3.4.0) reads
# chainProviders from the YAML config and wires up the per-packet claim
# pipeline at startup.
#
# Address provenance (DEV ONLY — Anvil deterministic deployment):
#   chainId=evm:31337       : matches services.anvil (chain-id 31337) in
#                             docker-compose-townhouse-hs.yml.
#   rpcUrl=http://anvil:8545 : Docker-internal DNS to the anvil service
#                             (NOT townhouse-hs-anvil — that's the
#                             container_name; `anvil` is the service name
#                             which is what other services on the
#                             townhouse-hs-net network resolve).
#   registryAddress         : TokenNetworkRegistry deployed by
#                             contracts/evm/script/DeployLocal.s.sol;
#                             deterministic from Anvil account[0] +
#                             nonce=2. Source: connector repo
#                             packages/connector/test/integration/multi-hop-helpers.ts:42
#                             Confirmed against
#                             contracts/evm/broadcast/DeployLocal.s.sol/31337/run-latest.json.
#   tokenAddress            : MockERC20 (USDC) deployed by the same script
#                             at deterministic Anvil account[0] nonce=0.
#                             Source: multi-hop-helpers.ts:45.
#   keyId                   : Anvil deterministic private key for account[3]
#                             (Peer2 in the connector test fixtures). NOT
#                             account[0] (deployer / treasury), NOT
#                             account[1] (faucet ETH source), NOT
#                             account[2] (already used as Peer1/treasury
#                             elsewhere in dev-infra). Source:
#                             multi-hop-helpers.ts:58.
chainProviders:
  - chainType: evm
    # MUST match the format `chain` field in /admin/channels (which the
    # connector's admin-API regex enforces as evm:<network>:<chainId>).
    # When ClaimReceiver looks up a provider by channel.chain it builds
    # the registry key from THAT string. Mismatch → "No provider
    # registered for blockchain: evm" warning + settlement-monitor
    # event-driven on-chain settlement silently disabled.
    chainId: evm:base:31337
    rpcUrl: http://anvil:8545
    registryAddress: '0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512'
    tokenAddress: '0x5FbDB2315678afecb367f032d93F642f64180aa3'
    keyId: '0x7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6'
