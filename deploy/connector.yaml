# =============================================================================
# store deploy — TOON connector (payment proxy) in front of the Arweave store
# =============================================================================
# BAKED into the store-connector image at /app/config/connector.yaml (see
# deploy/Dockerfile) — NOT bind-mounted. TLS is terminated by the deployment
# environment (no Caddy in this compose).
#
# Topology (RouteTermination — same model as the relay deploy):
#
#   payer ──POST /ilp (3000)──▶ connector ──POST /store──▶ store:3300  (store backend; PRIVATE)
#                                  (terminates the payment)   (payment-oblivious)
#
# - The connector's edge is `POST /ilp` (ILP-over-HTTP, RFC-0035). A paid PREPARE
#   addressed to `g.connector.store.*` terminates here; the literal HTTP request
#   carried in the PREPARE `data` (`POST /store`, body `{event}` — a signed
#   kind:5094 blob-storage event) is reverse-proxied to `upstream` (the store's
#   PRIVATE backend port 3300), and the store's HTTP response (`{txId}`) is
#   returned in the ILP FULFILL `data`. The store never sees ILP / settlement —
#   it is a payment-oblivious POST /store backend.
# - An UNPAID PREPARE is REJECTED — never reaches the store.
#
# PRICING: the connector enforces the FLAT route `price` below. Keep it aligned
# with the store's FEE_PER_JOB. Variable per-byte pricing is a connector-side
# follow-up.
#
# SETTLEMENT IDENTITY: ships with the anvil account-0 deterministic key as a
# working DEVNET FALLBACK (account 0 is pre-funded on the shared devnet) and its
# address as the route's settlement address. To run under YOUR OWN identity, set
# TOON_MNEMONIC in .env — it is derived at boot and OVERWRITES the `keyId` below;
# you must then also update routes[].settlementAddresses.evm to the derived EVM
# address (see README). The config loader does NOT interpolate ${...}; every
# value here is literal.
# =============================================================================

nodeId: connector
btpServerPort: 3000
healthCheckPort: 8080
environment: development
deploymentMode: standalone
logLevel: info

# ── Admin REST API ──────────────────────────────────────────────────────────
# Binds inside the container only; the compose service does NOT publish 8081.
adminApi:
  enabled: true
  host: 0.0.0.0
  port: 8081
  allowedIPs:
    - 172.16.0.0/12 # docker user-defined-bridge default pool
    - 192.168.0.0/16 # fallback when 172.16/12 is occupied

# NOTE: deliberately NO `localDelivery:` block. A global localDelivery handler
# would short-circuit the per-route HttpProxyHandler. Leaving it unset lets the
# terminated route below drive the HTTP reverse-proxy to the store backend.

settlement:
  connectorFeePercentage: 0.1
  enableSettlement: true
  tigerBeetleClusterId: 0
  tigerBeetleReplicas: []
  thresholds:
    defaultThreshold: '5000'
    pollingInterval: 100

# ── Settlement / chain providers ─────────────────────────────────────────────
# A single EVM entry pointing at the SHARED LIVE DEVNET (chainId 31337, the same
# deterministic anvil chain). rpcUrl is LITERAL (no ${} interpolation). The
# devnet serves a self-signed TLS cert, so the connector container runs with
# NODE_TLS_REJECT_UNAUTHORIZED=0 (set in docker-compose.yml) for its RPC/faucet
# calls. DEVNET-ONLY.
chainProviders:
  - chainType: evm
    chainId: evm:31337
    rpcUrl: https://evm-rpc.devnet.toonprotocol.dev
    registryAddress: '0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512'
    tokenAddress: '0x5FbDB2315678afecb367f032d93F642f64180aa3'
    keyId: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'
    settlementOptions:
      threshold: '5000'
      pollingIntervalMs: 100
      settlementTimeoutSecs: 3600
      initialDepositMultiplier: 2
      ledgerSnapshotPath: ./data/ledger-connector.json

peers: []

# ── Routes ──────────────────────────────────────────────────────────────────
# ONE terminated route. `upstream` points at the store's payment-oblivious HTTP
# job backend (3300, POST /store) over the compose network by service name — the
# host can never reach `store:3300` directly (that port is NOT published), which
# enforces the privacy invariant: paid writes MUST flow through the connector.
#
# `price` is a FLAT per-job price (align with the store's FEE_PER_JOB).
# `settlementAddresses.evm` is anvil account-0's address (matches the keyId
# above). With TOON_MNEMONIC set, change it to the mnemonic-derived EVM address.
routes:
  - prefix: g.connector.store
    nextHop: connector
    upstream: http://store:3300
    price: '10'
    chains:
      - evm
    ilpAddress: g.connector.store
    settlementAddresses:
      evm: '0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266'
